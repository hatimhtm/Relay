name: Relay
options:
  bundleIdPrefix: com.hatim
  # Ventura floor so 2017-era Intel Macs can run Relay. Newer features (Liquid
  # Glass on 26, Translation/scroll on 15) light up per-OS via #available — see
  # Glass.swift and the gated call sites.
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # In-app automatic updates (signed appcast hosted on GitHub Releases).
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    MARKETING_VERSION: "1.0.7"
    CURRENT_PROJECT_VERSION: "8"
    SWIFT_VERSION: "5.0"
    # No Apple Developer account required: builds are ad-hoc signed (CODE_SIGN_IDENTITY "-").
    # scripts/release.sh re-signs the bundle ad-hoc and ships it on GitHub Releases; users
    # approve it once via System Settings → Privacy & Security → "Open Anyway". To run from
    # Xcode with your own account instead, set CODE_SIGN_STYLE to Automatic + your team.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    # Universal so it runs on Intel too (release.sh also forces both arches +
    # ONLY_ACTIVE_ARCH=NO to guarantee a fat binary regardless of host).
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO

targets:
  # The native SwiftUI client (Liquid Glass), driven by the Go relay-helper
  # backend. Public target/product name is "Relay"; the source folder stays
  # RelayNative/ (no file moves needed).
  Relay:
    type: application
    platform: macOS
    sources:
      - path: RelayNative
    dependencies:
      - package: Sparkle
    # Explicit Info.plist (generated by xcodegen) so we can carry Sparkle's keys.
    info:
      path: RelayNative/Info.plist
      properties:
        LSUIElement: false
        NSMicrophoneUsageDescription: "Relay needs the microphone to record voice notes."
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Sparkle auto-update: signed appcast on GitHub Releases.
        SUFeedURL: "https://github.com/hatimhtm/Relay/releases/latest/download/appcast.xml"
        SUPublicEDKey: "WC5lwvOF89DNNoaqkTAcEXpmVGgOsjNATYKj17s90aY="
        # No background checks — updates happen only when the user clicks the button.
        SUEnableAutomaticChecks: false
    settings:
      base:
        PRODUCT_NAME: Relay
        PRODUCT_BUNDLE_IDENTIFIER: com.hatim.relay
        CODE_SIGN_ENTITLEMENTS: RelayNative/RelayNative.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        OTHER_LDFLAGS: "$(inherited) -lsqlite3"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
